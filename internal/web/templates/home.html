{{define "home.html"}}
<div class="card" style="max-width:560px; margin:3rem auto; text-align:center;">
  <div style="font-size:2.5rem; color:var(--accent); line-height:1;">⬡</div>
  <h1 style="margin-top:.5rem;">Edge Data Portal</h1>
  <p class="muted">Sign in with Keycloak to manage edge data sources, operators, and mission readiness — built to run disconnected and reconcile across the peat mesh.</p>
  <div style="margin-top:1.5rem;">
    {{if .Authenticated}}
      <a class="btn" href="/dashboard">Go to dashboard →</a>
    {{else}}
      <a class="btn" href="/auth/login">Sign in with Keycloak</a>
    {{end}}
  </div>
</div>
{{end}}
